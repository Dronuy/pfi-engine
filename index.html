<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFI Engine — Patellofemoral Instability Assessment</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e; --bg4: #383838;
  --text: #e0e0e0; --text2: #999; --text3: #666;
  --green: #4CAF50; --yellow: #FFC107; --orange: #FF9800; --red: #F44336;
  --blue: #2196F3; --accent: #00BCD4;
  --border: #3a3a3a;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; line-height: 1.5; }

/* ── Top bar ─────────────────────────────────────────────────────────── */
header { background: var(--bg2); padding: 16px 24px; border-bottom: 1px solid var(--border); }
header h1 { font-size: 18px; font-weight: 600; color: var(--accent); letter-spacing: 0.3px; }
header .tagline { font-size: 13px; color: var(--text2); margin-top: 3px; }
header .disclaimer { display: inline-block; margin-top: 8px; padding: 4px 10px; background: rgba(244,67,54,0.12); border: 1px solid rgba(244,67,54,0.3); color: #ff8a80; font-size: 11px; border-radius: 4px; letter-spacing: 0.3px; }

/* ── Layout grid ─────────────────────────────────────────────────────── */
main { max-width: 1280px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
@media (max-width: 900px) { main { grid-template-columns: 1fr; padding: 16px; gap: 16px; } }

/* ── Case selector (left rail) ───────────────────────────────────────── */
#cases { display: flex; flex-direction: column; gap: 10px; }
@media (max-width: 900px) { #cases { flex-direction: row; overflow-x: auto; padding-bottom: 8px; } }
.case-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; min-width: 200px; }
.case-card:hover { border-color: var(--accent); }
.case-card.active { border-color: var(--accent); background: var(--bg3); }
.case-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.case-card .headline { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.case-card .summary { font-size: 12px; color: var(--text2); line-height: 1.4; }
.case-card .badge { display: inline-block; margin-top: 8px; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 3px; }

/* ── Main view ───────────────────────────────────────────────────────── */
#main-view { min-width: 0; }
#welcome { background: var(--bg2); padding: 24px; border-radius: 8px; border: 1px solid var(--border); }
#welcome h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
#welcome p { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.placeholder-link { color: var(--text3); font-style: italic; font-size: 12px; }

#case-view { display: none; }
.composite-card { background: var(--bg2); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
.composite-card .composite-headline { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
.composite-card .composite-badge { display: inline-block; margin-top: 8px; padding: 8px 18px; font-size: 18px; font-weight: 700; border-radius: 6px; letter-spacing: 0.5px; }
.composite-card .composite-rec { margin-top: 12px; font-size: 13px; color: var(--text); line-height: 1.5; }

/* ── Domain panels (accordion) ──────────────────────────────────────── */
.domain-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.domain-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.15s; }
.domain-header:hover { background: var(--bg3); }
.domain-header h3 { font-size: 15px; font-weight: 600; }
.domain-header .right { display: flex; align-items: center; gap: 12px; }
.domain-header .domain-verdict { font-size: 12px; padding: 3px 10px; border-radius: 3px; font-weight: 600; }
.domain-header .chevron { color: var(--text2); font-size: 11px; transition: transform 0.2s; }
.domain-panel.expanded .chevron { transform: rotate(180deg); }
.domain-body { display: none; padding: 12px 18px 18px; border-top: 1px solid var(--border); background: var(--bg); }
.domain-panel.expanded .domain-body { display: block; }

/* ── Index cards ─────────────────────────────────────────────────────── */
.index-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.index-card .row1 { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.index-card .name { font-size: 13px; font-weight: 600; }
.index-card .ref { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.3px; }
.index-card .right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.index-card .value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.index-card .verdict { font-size: 11px; padding: 3px 9px; border-radius: 3px; font-weight: 600; letter-spacing: 0.3px; }
.index-card .threshold { font-size: 11px; color: var(--text2); margin-top: 6px; }

/* Verdict colours */
.v-normal     { background: rgba(76,175,80,0.15);  color: var(--green); }
.v-borderline { background: rgba(255,193,7,0.15);  color: var(--yellow); }
.v-abnormal   { background: rgba(244,67,54,0.15);  color: var(--red); }
.v-info       { background: rgba(33,150,243,0.15); color: var(--blue); }

/* Composite phenotype colours */
.comp-Normal   { background: rgba(76,175,80,0.18);  color: var(--green);  border: 1px solid rgba(76,175,80,0.35); }
.comp-Mild     { background: rgba(255,193,7,0.18);  color: var(--yellow); border: 1px solid rgba(255,193,7,0.35); }
.comp-Moderate { background: rgba(255,152,0,0.18);  color: var(--orange); border: 1px solid rgba(255,152,0,0.35); }
.comp-Severe   { background: rgba(244,67,54,0.18);  color: var(--red);    border: 1px solid rgba(244,67,54,0.35); }

/* ── Discordance flags section ───────────────────────────────────────── */
.flags-section { background: var(--bg2); border: 1px solid rgba(33,150,243,0.35); border-radius: 8px; padding: 16px; margin-top: 16px; }
.flags-section h3 { font-size: 14px; color: var(--blue); margin-bottom: 10px; }
.flag-card { background: rgba(33,150,243,0.08); border-left: 3px solid var(--blue); padding: 10px 14px; border-radius: 4px; margin-bottom: 8px; }
.flag-card .flag-title { font-size: 13px; font-weight: 600; color: var(--blue); margin-bottom: 4px; }
.flag-card .flag-text { font-size: 12px; color: var(--text); line-height: 1.5; }

/* ── Internal verification (de-emphasized) ──────────────────────────── */
.internal-section { margin-top: 16px; padding: 12px 16px; background: var(--bg2); border: 1px dashed var(--text3); border-radius: 6px; }
.internal-section h3 { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
.internal-section .label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-style: italic; }
.internal-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.internal-row .iname { color: var(--text2); }
.internal-row .ival { color: var(--text); font-variant-numeric: tabular-nums; font-weight: 500; }

/* ── Generate report button + modal ────────────────────────────────── */
#report-btn { width: 100%; padding: 12px; margin-top: 16px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
#report-btn:hover { background: #00a5b5; }

#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
#modal-bg.show { display: flex; }
.modal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; max-width: 720px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 15px; }
.modal-header .close { cursor: pointer; color: var(--text2); font-size: 22px; padding: 4px 10px; border-radius: 4px; }
.modal-header .close:hover { background: var(--bg3); color: var(--text); }
.modal-body { padding: 18px; overflow-y: auto; }
.modal-body pre { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; color: var(--text); white-space: pre-wrap; word-break: break-all; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.btn-secondary { padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg3); color: var(--text); font-size: 12px; cursor: pointer; }
.btn-secondary:hover { border-color: var(--accent); }
.btn-secondary.copied { background: var(--green); border-color: var(--green); color: #fff; }

/* ── Footer ──────────────────────────────────────────────────────────── */
footer { padding: 24px; text-align: center; color: var(--text3); font-size: 11px; border-top: 1px solid var(--border); margin-top: 32px; }
footer a { color: var(--text2); }
.cite-list { margin-top: 12px; font-size: 10px; color: var(--text3); }
.cite-list ul { list-style: none; padding: 0; }
.cite-list li { padding: 2px 0; }
</style>
</head>
<body>

<header>
  <h1 id="title">PFI Engine — Patellofemoral Instability Assessment</h1>
  <div class="tagline" id="tagline">…</div>
  <span class="disclaimer" id="disclaimer">…</span>
</header>

<main>
  <aside id="cases"></aside>

  <section id="main-view">
    <div id="welcome">
      <h2>About this demo</h2>
      <p id="about">…</p>
      <p class="placeholder-link" id="methodology">…</p>
    </div>
    <div id="case-view"></div>
  </section>
</main>

<div id="modal-bg" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Generated report</h3>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body"><pre id="report-text"></pre></div>
    <div class="modal-footer">
      <button class="btn-secondary" id="copy-btn" onclick="copyReport()">Copy to clipboard</button>
      <button class="btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<footer>
  <div>FOR RESEARCH USE ONLY · Pre-publication prototype · Public test cases from <a href="https://fastmri.med.nyu.edu/" target="_blank">fastMRI dataset</a></div>
  <div class="cite-list" id="cite-list"></div>
</footer>

<script>
const DEMO_BASE = 'data';        // local relative path; can be replaced with a CDN base
let manifest = null;
let currentCase = null;
let caseData = {};

const VERDICT_COLOURS = {
  Normal: 'v-normal', 'Borderline Alta': 'v-borderline', 'Borderline Baja': 'v-borderline',
  Alta: 'v-abnormal', Baja: 'v-abnormal',
};

async function init() {
  const res = await fetch(`${DEMO_BASE}/manifest_v3.json`);
  manifest = await res.json();
  document.getElementById('title').textContent      = manifest.title;
  document.getElementById('tagline').textContent    = manifest.tagline;
  document.getElementById('disclaimer').textContent = manifest.disclaimer;
  document.getElementById('about').textContent      = manifest.about;
  document.getElementById('methodology').textContent = manifest.methodology_placeholder;

  // Citations
  const cl = document.getElementById('cite-list');
  cl.innerHTML = '<strong>Literature references</strong><ul>' +
    manifest.citations.map(c => `<li>· ${c}</li>`).join('') +
    '</ul>';

  // Cases sidebar
  const aside = document.getElementById('cases');
  manifest.cases.forEach(c => {
    const div = document.createElement('div');
    div.className = 'case-card';
    div.dataset.case = c.case_name;
    const compCls = `comp-${c.composite_phenotype}`;
    div.innerHTML = `
      <div class="label">Case</div>
      <div class="headline">${c.headline}</div>
      <div class="summary">${c.summary}</div>
      <span class="badge ${compCls}">${c.composite_phenotype}</span>
    `;
    div.onclick = () => selectCase(c.case_name);
    aside.appendChild(div);
  });

  if (manifest.cases.length) selectCase(manifest.cases[0].case_name);
}

async function selectCase(name) {
  currentCase = name;
  document.querySelectorAll('.case-card').forEach(c =>
    c.classList.toggle('active', c.dataset.case === name));
  if (!caseData[name]) {
    const res = await fetch(`${DEMO_BASE}/${name}/index_v3.json`);
    caseData[name] = await res.json();
  }
  renderCase(caseData[name]);
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('case-view').style.display = 'block';
}

function verdictForCart(v, cutoff, op, lo, hi) {
  // 3-tier verdict where cart screening uses Tanaka 3-tier (Normal/Borderline/Abnormal).
  // Borderline thresholds are conservative (within +/-1 unit of cutoff).
  if (v === null || v === undefined) return ['—', 'v-info'];
  const passes = (op === 'ge') ? v >= cutoff : v <= cutoff;
  if (passes) return ['Abnormal', 'v-abnormal'];
  // Borderline if within margin
  const margin = Math.abs(cutoff) * 0.05 + 1.0;   // generic 5% relative or 1 abs unit
  if ((op === 'ge' && v >= cutoff - margin) || (op === 'le' && v <= cutoff + margin)) {
    return ['Borderline', 'v-borderline'];
  }
  return ['Normal', 'v-normal'];
}

function categoryClass(cat) {
  if (!cat) return 'v-info';
  if (cat === 'Normal') return 'v-normal';
  if (cat.includes('Borderline')) return 'v-borderline';
  return 'v-abnormal';
}

function renderCase(c) {
  const v = document.getElementById('case-view');
  const composite = c.composite_phenotype || 'Normal';
  const recText = (manifest.phenotype_recommendations || {})[composite] || '';

  let html = `
    <div class="composite-card">
      <div class="composite-headline">Composite phenotype</div>
      <span class="composite-badge comp-${composite}">${composite}</span>
      <div class="composite-rec">${recText}</div>
    </div>`;

  // Domain A — Patellar Height
  const ph = c.patellar_height || {};
  const ph_comp = c.patellar_height_composite || 'normal';
  const phVerdict = ph_comp === 'normal' ? ['Normal', 'v-normal']
                   : ph_comp.includes('borderline') ? ['Borderline', 'v-borderline']
                   : ['Abnormal', 'v-abnormal'];
  html += panelHtml('A — Patellar Height', phVerdict, [
    indexCardHtml('Insall-Salvati index', ph.IS, 'IS'),
    indexCardHtml('Caton-Deschamps index', ph.CDI, 'CDI'),
    indexCardHtml('Patellotrochlear index', ph.PTI, 'PTI'),
  ]);

  // Domain B — Trochlear Morphology
  const td = c.trochlear_dysplasia || {};
  const grade = td.composite_grade || 'no_dysplasia';
  const tdVerdict = grade === 'no_dysplasia' ? ['No dysplasia', 'v-normal']
                   : grade === 'low_grade'   ? ['Low grade', 'v-borderline']
                   : grade === 'moderate'    ? ['Moderate', 'v-borderline']
                                              : ['High grade', 'v-abnormal'];
  const cs = td.cart_screening || {};
  const bc = td.bone_convention || {};
  html += panelHtml('B — Trochlear Morphology (cart-primary, bone corroboration)', tdVerdict, [
    `<div style="font-size:12px;color:var(--text2);margin:8px 0 6px;font-weight:600;letter-spacing:0.5px;">Cart screening (Tanaka 2023)</div>`,
    indexCardHtmlGeneric('Cart Sulcus Angle (SA)',  cs.Cart_SA,  'deg'),
    indexCardHtmlGeneric('Cart Lateral Trochlear Inclination (LTI)', cs.Cart_LTI, 'deg'),
    indexCardHtmlGeneric('Cart Trochlear Depth (TD)', cs.Cart_TD, 'mm'),
    `<div style="font-size:12px;color:var(--text2);margin:14px 0 6px;font-weight:600;letter-spacing:0.5px;">Bone corroboration (Pfirrmann / Carrillon)</div>`,
    indexCardHtmlGeneric('Bone Sulcus Angle',  bc.Bone_SA,  'deg'),
    indexCardHtmlGeneric('Bone Lateral Trochlear Inclination', bc.Bone_LTI, 'deg'),
    indexCardHtmlGeneric('Bone Trochlear Depth', bc.Bone_TD, 'mm'),
    indexCardHtmlGeneric('Bone Trochlear Facet Asymmetry', bc.Bone_TFA, 'ratio'),
  ]);

  // Domain C — Lateralization
  const lat = c.lateralization || {};
  const latPheno = lat.phenotype || 'normal';
  const latVerdict = latPheno === 'lateralized' ? ['Lateralized', 'v-abnormal']
                                                  : ['Normal', 'v-normal'];
  html += panelHtml('C — Lateralization', latVerdict, [
    indexCardHtmlGeneric('Patellar Tendon - Trochlear Groove (PT-TG)', lat, 'mm'),
  ]);

  // Domain D — Patellar Tilt
  const pt = c.patellar_tilt || {};
  const ptPheno = pt.phenotype || 'normal';
  const ptVerdict = ptPheno === 'tilted' ? ['Tilted', 'v-abnormal'] : ['Normal', 'v-normal'];
  html += panelHtml('D — Patellar Tilt', ptVerdict, [
    indexCardHtmlGeneric('Patellar Tilt angle', pt, 'deg'),
  ]);

  // Discordance flags
  if (c.discordance_flags && c.discordance_flags.length) {
    html += `<div class="flags-section">
      <h3>📌 Discordance flags</h3>
      ${c.discordance_flags.map(f => `
        <div class="flag-card">
          <div class="flag-title">${f.title}</div>
          <div class="flag-text">${f.text}</div>
        </div>`).join('')}
    </div>`;
  }

  // Internal verification (de-emphasized)
  const iv = c.internal_verification || {};
  if (iv.Cart_TFA || iv.sPT_TG_cart) {
    html += `<div class="internal-section">
      <h3>Internal verification (supplementary)</h3>
      <div class="label">Computed for internal consistency only — not primary screening output.</div>`;
    if (iv.Cart_TFA && iv.Cart_TFA.value !== undefined && iv.Cart_TFA.value !== null) {
      html += `<div class="internal-row"><span class="iname">Cart-TFA (cart-bone consistency check)</span><span class="ival">${formatVal(iv.Cart_TFA.value, 'ratio')}</span></div>`;
    }
    if (iv.sPT_TG_cart && iv.sPT_TG_cart.value !== undefined && iv.sPT_TG_cart.value !== null) {
      html += `<div class="internal-row"><span class="iname">Signed PT-TG (AP-axis check)</span><span class="ival">${formatVal(iv.sPT_TG_cart.value, 'mm')}</span></div>`;
    }
    html += `</div>`;
  }

  html += `<button id="report-btn" onclick="generateReport()">Generate text report</button>`;

  v.innerHTML = html;

  // Bind accordion
  document.querySelectorAll('.domain-header').forEach(h => {
    h.onclick = () => h.parentElement.classList.toggle('expanded');
  });
  // Auto-expand all panels by default for the demo
  document.querySelectorAll('.domain-panel').forEach(p => p.classList.add('expanded'));
}

function panelHtml(title, verdict, body) {
  const [vText, vCls] = verdict;
  const inner = Array.isArray(body) ? body.join('') : body;
  return `<div class="domain-panel expanded">
    <div class="domain-header">
      <h3>${title}</h3>
      <div class="right">
        <span class="domain-verdict ${vCls}">${vText}</span>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="domain-body">${inner}</div>
  </div>`;
}

function indexCardHtml(name, idx, key) {
  if (!idx) return '';
  const cat = idx.category || '—';
  const cls = categoryClass(cat);
  const ref = idx.reference || '';
  const v   = formatVal(idx.value, '');
  const tA  = idx.cutoff_alta;
  const tB  = idx.cutoff_baja;
  const ths = `Alta &gt; ${tA} · Baja &lt; ${tB}`;
  return `<div class="index-card">
    <div class="row1">
      <div>
        <div class="name">${name}</div>
        <div class="ref">${ref}</div>
      </div>
      <div class="right">
        <span class="value">${v}</span>
        <span class="verdict ${cls}">${cat}</span>
      </div>
    </div>
    <div class="threshold">Thresholds: ${ths}</div>
  </div>`;
}

function indexCardHtmlGeneric(name, idx, unit) {
  if (!idx) return '';
  const v = idx.value;
  if (v === undefined || v === null) {
    return `<div class="index-card">
      <div class="row1">
        <div><div class="name">${name}</div></div>
        <div class="right"><span class="verdict v-info">N/A</span></div>
      </div></div>`;
  }
  const cutoff = idx.cutoff;
  const op = idx.op || 'ge';
  const [vText, vCls] = verdictForCart(v, cutoff, op);
  const ref = idx.reference || '';
  const opSym = op === 'ge' ? '&ge;' : '&le;';
  const ths = `Threshold: ${opSym} ${cutoff}`;
  return `<div class="index-card">
    <div class="row1">
      <div>
        <div class="name">${name}</div>
        <div class="ref">${ref}</div>
      </div>
      <div class="right">
        <span class="value">${formatVal(v, unit)}</span>
        <span class="verdict ${vCls}">${vText}</span>
      </div>
    </div>
    <div class="threshold">${ths} ${unit ? `(${unit})` : ''}</div>
  </div>`;
}

function formatVal(v, unit) {
  if (v === null || v === undefined) return '—';
  let s;
  if (typeof v === 'number') {
    if (Math.abs(v) < 1) s = v.toFixed(3);
    else if (Math.abs(v) < 10) s = v.toFixed(2);
    else s = v.toFixed(1);
  } else s = String(v);
  if (unit && unit !== 'ratio') s += ` ${unit}`;
  return s;
}

function generateReport() {
  const c = caseData[currentCase];
  if (!c) return;
  const lines = [];
  lines.push(`PATELLOFEMORAL INSTABILITY ASSESSMENT (automated)`);
  lines.push(``);
  lines.push(`Case label : ${(manifest.cases.find(x => x.case_name === currentCase) || {}).headline || currentCase}`);
  lines.push(`Composite phenotype : ${c.composite_phenotype || '?'}`);
  lines.push(``);
  // Patellar Height
  lines.push(`PATELLAR HEIGHT`);
  const ph = c.patellar_height || {};
  ['IS','CDI','PTI'].forEach(k => {
    const i = ph[k];
    if (!i) return;
    lines.push(`  ${k.padEnd(4)} : ${formatVal(i.value,'')}  (${i.category || '—'})  [${i.reference}]`);
  });
  lines.push(`  Composite : ${c.patellar_height_composite}`);
  lines.push(``);
  // Trochlear
  lines.push(`TROCHLEAR MORPHOLOGY`);
  const td = c.trochlear_dysplasia || {};
  const cs = td.cart_screening || {};
  const bc = td.bone_convention || {};
  lines.push(`  Cart screening (Tanaka 2023):`);
  ['Cart_SA','Cart_LTI','Cart_TD'].forEach(k => {
    const i = cs[k]; if (!i) return;
    lines.push(`    ${k.padEnd(8)} = ${formatVal(i.value,'')}  threshold ${i.op === 'ge' ? '>=' : '<='} ${i.cutoff}`);
  });
  lines.push(`  Bone corroboration (Pfirrmann / Carrillon):`);
  ['Bone_SA','Bone_LTI','Bone_TD','Bone_TFA'].forEach(k => {
    const i = bc[k]; if (!i) return;
    lines.push(`    ${k.padEnd(8)} = ${formatVal(i.value,'')}  threshold ${i.op === 'ge' ? '>=' : '<='} ${i.cutoff}`);
  });
  lines.push(`  Composite grade : ${td.composite_grade}`);
  lines.push(``);
  // Lateralization + tilt
  const lat = c.lateralization || {};
  if (lat.value !== undefined) {
    lines.push(`LATERALIZATION (Hinckel 2015 PT-TG)`);
    lines.push(`  Value : ${formatVal(lat.value,'mm')}  threshold >= ${lat.cutoff} mm  -> ${lat.phenotype}`);
    lines.push(``);
  }
  const pt = c.patellar_tilt || {};
  if (pt.value !== undefined) {
    lines.push(`PATELLAR TILT (Sallay 1996)`);
    lines.push(`  Value : ${formatVal(pt.value,'deg')}  threshold >= ${pt.cutoff} deg  -> ${pt.phenotype}`);
    lines.push(``);
  }
  // Flags
  if (c.discordance_flags && c.discordance_flags.length) {
    lines.push(`FLAGS:`);
    c.discordance_flags.forEach(f => {
      lines.push(`  - ${f.title}`);
      lines.push(`    ${f.text}`);
    });
    lines.push(``);
  }
  // Recommendation
  const rec = (manifest.phenotype_recommendations || {})[c.composite_phenotype];
  if (rec) {
    lines.push(`RECOMMENDATION : ${rec}`);
    lines.push(``);
  }
  lines.push(`---`);
  lines.push(`FOR RESEARCH USE ONLY. Pre-publication prototype.`);
  document.getElementById('report-text').textContent = lines.join('\n');
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal(e) {
  if (e && e.target.id !== 'modal-bg' && e.type === 'click') return;
  document.getElementById('modal-bg').classList.remove('show');
}

function copyReport() {
  const text = document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'Copy to clipboard';
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
</body>
</html>
