<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PFI Engine - moved to Poluneev</title>
<meta http-equiv="refresh" content="0; url=https://poluneev.com/demo">
<link rel="canonical" href="https://poluneev.com/demo">
<meta name="description" content="The PFI Engine demo has moved to poluneev.com/demo. You will be redirected automatically.">
<meta name="robots" content="noindex, follow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #FFFFFF;
    color: #1F2937;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 480px; }
  .logo {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #0D9488;
    color: #FFFFFF;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 32px;
    margin-bottom: 24px;
    letter-spacing: 0.01em;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #0D9488;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  p { color: #4B5563; line-height: 1.6; margin-bottom: 8px; }
  p.note { color: #6B7280; font-size: 14px; margin-top: 18px; }
  a {
    color: #0D9488;
    font-weight: 600;
    text-decoration: none;
  }
  a:hover { color: #0B7C72; text-decoration: underline; }
</style>
</head>
<body>
<main class="card">
  <div class="logo" aria-hidden="true">P</div>
  <h1>PFI Engine has moved to Poluneev</h1>
  <p>Redirecting to <a href="https://poluneev.com/demo">poluneev.com/demo</a>&hellip;</p>
  <p class="note">
    If you are not redirected automatically,
    <a href="https://poluneev.com/demo">click here to continue</a>.
  </p>
</main>
<script>
  // Belt + braces: meta-refresh handles ~99%; JS catches anything that
  // ignored it (e.g. some screen-readers with refresh disabled).
  setTimeout(function () {
    window.location.replace("https://poluneev.com/demo");
  }, 50);
</script>
</body>
</html>
